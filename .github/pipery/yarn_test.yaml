name: yarn-package-manager
description: Verify the action correctly detects and uses Yarn.
source_path: test-project-yarn
inputs:
  project_path: test-project-yarn
  package_manager: auto
  skip_sast: "true"
  skip_sca: "true"
  skip_lint: "true"
  skip_release: "true"
  skip_versioning: "true"
  skip_reintegration: "true"
expect:
  log_path: pipery.jsonl
  success_values: [success, passed, ok, succeeded]
  required_fields:
    - name: event
      value: build
