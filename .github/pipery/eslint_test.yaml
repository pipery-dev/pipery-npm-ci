name: eslint-configured-project
description: Verify lint step runs ESLint when .eslintrc.json is present.
source_path: test-project-eslint
inputs:
  project_path: test-project-eslint
  skip_sast: "true"
  skip_sca: "true"
  skip_release: "true"
  skip_versioning: "true"
  skip_reintegration: "true"
expect:
  log_path: pipery.jsonl
  success_values: [success, passed, ok, succeeded]
  required_fields:
    - name: event
      value: build
