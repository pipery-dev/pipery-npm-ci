name: project-with-build-script
description: Verify the action runs the build script when present in package.json.
source_path: test-project-with-build
inputs:
  project_path: test-project-with-build
  skip_sast: "true"
  skip_sca: "true"
  skip_lint: "true"
  skip_release: "true"
  skip_versioning: "true"
  skip_reintegration: "true"
expect:
  log_path: pipery.jsonl
  success_values: [success, passed, ok, succeeded]
  required_fields:
    - name: event
      value: build
